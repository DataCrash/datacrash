<svg width="360" height="52" viewBox="0 0 360 52" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Root Gateway</title>
  <desc id="desc">Badge for the root site link</desc>
  <defs>
    <linearGradient id="frame" x1="24" y1="6" x2="336" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FE1FF" />
      <stop offset="1" stop-color="#FF7A18" />
    </linearGradient>
    <linearGradient id="divider" x1="112" y1="10" x2="112" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FE1FF" />
      <stop offset="1" stop-color="#FF7A18" />
    </linearGradient>
    <radialGradient id="panel" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(72 10) rotate(27.9171) scale(329.472 120.831)">
      <stop stop-color="#242A33" />
      <stop offset="1" stop-color="#161A20" />
    </radialGradient>
    <filter id="glow" x="-20" y="-20" width="400" height="92" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4FE1FF" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#FF7A18" flood-opacity="0.28" />
    </filter>
  </defs>
  <g filter="url(#glow)">
    <rect x="6" y="6" width="348" height="40" rx="20" fill="url(#panel)" stroke="url(#frame)" />
    <rect x="18" y="14" width="12" height="12" rx="6" fill="#4FE1FF" fill-opacity="0.95" />
    <rect x="26" y="24" width="10" height="10" rx="5" fill="#FF7A18" fill-opacity="0.92" />
    <path d="M112 12V40" stroke="url(#divider)" stroke-width="1.25" stroke-linecap="round" />
    <text x="46" y="29" fill="#EAF7FF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.6">ROOT</text>
    <text x="128" y="29" fill="#F6F9FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.4">datacrash.github.io</text>
  </g>
</svg>
