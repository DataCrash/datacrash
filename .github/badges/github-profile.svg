<svg width="290" height="52" viewBox="0 0 290 52" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub DataCrash</title>
  <desc id="desc">Badge for the GitHub profile link</desc>
  <defs>
    <linearGradient id="frame" x1="20" y1="6" x2="270" y2="46" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FE1FF" />
      <stop offset="1" stop-color="#FF7A18" />
    </linearGradient>
    <linearGradient id="divider" x1="114" y1="10" x2="114" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4FE1FF" />
      <stop offset="1" stop-color="#FF7A18" />
    </linearGradient>
    <radialGradient id="panel" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(64 10) rotate(28) scale(280 110)">
      <stop stop-color="#242A33" />
      <stop offset="1" stop-color="#161A20" />
    </radialGradient>
    <filter id="glow" x="-20" y="-20" width="330" height="92" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4FE1FF" flood-opacity="0.45" />
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#FF7A18" flood-opacity="0.28" />
    </filter>
  </defs>
  <g filter="url(#glow)">
    <rect x="6" y="6" width="278" height="40" rx="20" fill="url(#panel)" stroke="url(#frame)" />
    <circle cx="24" cy="26" r="6" fill="#4FE1FF" fill-opacity="0.95" />
    <circle cx="34" cy="26" r="4" fill="#FF7A18" fill-opacity="0.92" />
    <path d="M114 12V40" stroke="url(#divider)" stroke-width="1.25" stroke-linecap="round" />
    <text x="48" y="29" fill="#EAF7FF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.1">GITHUB</text>
    <text x="130" y="29" fill="#F6F9FC" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.4">DataCrash</text>
  </g>
</svg>
